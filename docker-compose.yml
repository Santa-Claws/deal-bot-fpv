services:
  # ─────────────────────────────────────────────────────
  # PostgreSQL - primary data store for products, prices, deals
  # ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fpv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fpvdeals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fpvdeals}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fpvdeals}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Redis - Celery broker for background scraping tasks
  # ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fpv-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Meilisearch - typo-tolerant full-text search engine
  # Lightweight alternative to Elasticsearch
  # ─────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: fpv-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Ollama - local AI inference (Mistral 7B, etc.)
  # Handles query understanding and deal scoring
  # GPU passthrough enabled for RTX 3080
  # ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: fpv-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment to enable GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────────────
  # Backend - FastAPI application
  # Handles scraping orchestration, API, AI integration
  # ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fpv-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fpvdeals}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-fpvdeals}
      REDIS_URL: redis://redis:6379/0
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-6}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./config:/app/config
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────
  # Celery Worker - background scraping tasks
  # Separate from the API so scraping doesn't block requests
  # ─────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fpv-celery-worker
    restart: unless-stopped
    command: celery -A app.scrapers.runner worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fpvdeals}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-fpvdeals}
      REDIS_URL: redis://redis:6379/0
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      SCRAPE_INTERVAL_HOURS: ${SCRAPE_INTERVAL_HOURS:-6}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Celery Beat - task scheduler (triggers scrapers)
  # ─────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fpv-celery-beat
    restart: unless-stopped
    command: celery -A app.scrapers.runner beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fpvdeals}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-fpvdeals}
      REDIS_URL: redis://redis:6379/0
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - celery_beat_data:/app/celerybeat-schedule
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────
  # Frontend - SvelteKit application
  # Dark mode UI with electric blue/green FPV aesthetic
  # ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fpv-frontend
    restart: unless-stopped
    environment:
      PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  meilisearch_data:
  ollama_data:
  celery_beat_data:
